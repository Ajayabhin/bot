<!DOCTYPE html>
<html>
<head>
    <title>Basic Chatbot</title>

    <style>
        body {
            font-family: Arial;
            width: 500px;
            margin: 40px auto;
        }

        #chatbox {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
            margin: 10px 0;
        }

        .bot {
            color: green;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h2>AI Chatbot</h2>

<div id="chatbox"></div>

<input type="text" id="message" placeholder="Type message..." style="width:80%;">
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {

    const input = document.getElementById("message");
    const message = input.value;

    if (!message) return;

    const chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user"><b>ne than:</b> ${message}</div>`;

    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message})
    });

    const data = await response.json();

    chatbox.innerHTML += `<div class="bot"><b>Bot:</b> ${data.reply}</div>`;

    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
